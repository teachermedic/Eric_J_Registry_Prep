<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Respiratory Mentor | Eric J's Field Notes</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        #mentor-container {
            max-width: 600px;
            margin: 20px auto;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }
        #user-query {
            flex-grow: 1;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid var(--accent-blue);
            font-size: 1rem;
        }
        .field-note-box {
            background: #e3f2fd;
            border-left: 5px solid var(--accent-blue);
            padding: 15px;
            margin-top: 15px;
            border-radius: 8px;
            font-style: italic;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: var(--primary-blue);
            font-weight: bold;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div id="quiz-container">
        <a href="index.html" class="back-btn">
            <span class="material-icons">arrow_back</span> Back to Library
        </a>

        <div id="mentor-container">
            <h2>Respiratory Emergency Mentor</h2>
            <p>Ask a question about Chapter 17 (e.g., "What is asthma?" or "How does CPAP work?")</p>
            
            <div class="search-box">
                <input type="text" id="user-query" placeholder="Type clinical concept here...">
                <button class="mode-btn" style="width: auto;" onclick="askMentor()">Ask Mentor</button>
            </div>

            <div id="mentor-response" style="display:none; animation: fadeIn 0.5s;">
                <h3 id="response-title" style="color: var(--primary-blue); border-bottom: 2px solid #eee; padding-bottom: 10px;"></h3>
                <p id="response-text" style="line-height: 1.6; margin-top: 15px;"></p>
                <div id="response-field-note" class="field-note-box"></div>
                
                <button class="mode-btn" onclick="startTargetedQuiz()" style="margin-top:20px; background-color: var(--primary-blue);">
                    <span class="material-icons">quiz</span> Test My Knowledge on This
                </button>
            </div>
        </div>
    </div>

    <script>
        let respiratoryData = [];

        // Load the Knowledge Base
        fetch('respiratory_kb.json')
            .then(response => response.json())
            .then(data => respiratoryData = data)
            .catch(err => console.error("Error loading knowledge base:", err));

        function askMentor() {
            const query = document.getElementById('user-query').value.toLowerCase();
            const display = document.getElementById('mentor-response');
            
            // Simple keyword matching
            const match = respiratoryData.find(item => 
                item.keywords.some(keyword => query.includes(keyword))
            );

            if (match) {
                display.style.display = 'block';
                document.getElementById('response-title').innerText = match.title;
                document.getElementById('response-text').innerText = match.explanation;
                document.getElementById('response-field-note').innerHTML = "<strong>Field Note:</strong> " + match.field_note;
            } else {
                alert("I don't have a plain-language explanation for that yet. Try 'Asthma', 'COPD', 'CPAP', or 'PE'.");
            }
        }

        function startTargetedQuiz() {
            const currentTopic = document.getElementById('response-title').innerText;
            // Save the topic to local storage for the main script to pick up
            localStorage.setItem('mentor_targeted_topic', currentTopic);
            // Redirect to the main quiz with the mentor mode trigger
            window.location.href = 'index.html?mode=mentor';
        }

        // Allow "Enter" key to trigger search
        document.getElementById('user-query').addEventListener("keypress", function(e) {
            if (e.key === "Enter") askMentor();
        });
    </script>
</body>
</html>
