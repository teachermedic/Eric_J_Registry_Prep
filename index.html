<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eric J's Field Notes | AEMT Prep</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="quiz-container">
        <h1>Eric J's Field Notes</h1>
        <h2 class="subtitle">AEMT Foundation Prep</h2>
        
        <div id="setup-area">
            <p style="text-align: center; margin-bottom: 30px;">Select your study mode for Chapters 1-6.</p>
            <button class="mode-btn" onclick="startQuiz('review')">Option 1: Review Mode (Instant Feedback)</button>
            <div style="height: 20px;"></div>
            <button class="mode-btn" onclick="startQuiz('exam')">Option 2: Exam Mode (60 Min Timer)</button>
        </div>

        <div id="quiz-area" style="display:none;">
            <div id="timer-container">Time Remaining: <span id="timer-display">60:00</span></div>
            <div id="progress"></div>
            <div id="question-text"></div>
            <div id="options-container"></div>
            <button id="action-btn" onclick="handleAction()">Submit Answer</button>
            <div id="feedback"></div>
        </div>

        <div id="results-area" style="display:none;">
            <h2>Assessment Complete</h2>
            <div id="final-results-card">
                <p id="score-display"></p>
                <p id="percentage-display"></p>
                <div id="category-breakdown"></div>
                <p id="pass-status"></p>
            </div>

            <div id="subscription-zone" style="margin-top: 30px; text-align: center;">
                <p style="font-weight: bold; color: var(--primary-blue);">Get the next Chapter Analysis in your inbox:</p>
                <iframe src="https://ericjm.substack.com/embed" width="100%" height="320" style="border: 1px solid #EEE; background: white; border-radius: 12px;" frameborder="0" scrolling="no"></iframe>
            </div>

            <button onclick="location.reload()" style="margin-top: 20px;">Restart Quiz Session</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
